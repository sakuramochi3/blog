<style>
  body {
    font-family: Verdana, sans-serif;
    margin: auto;
    padding: 20px;
    max-width: 720px;
    text-align: left;
    background-color: #faf4ed;
    word-wrap: break-word;
    overflow-wrap: break-word;
    line-height: 1.5;
    color: #444;
  }

  h1,
  h2,
  h3,
  h4,
  h5,
  h6,
  strong,
  b {
    color: #575279;
  }

  a {
    color: #907aa9;
    /*color: #ff5e6c;*/
  }

  .title {
    text-decoration: none;
    border: 0;
  }

  .title span {
    font-weight: 400;
  }

  nav a {
    margin-right: 10px;
  }

  textarea {
    width: 100%;
    font-size: 16px;
  }

  input {
    font-size: 16px;
  }

  content {
    line-height: 1.6;
  }

  table {
    width: 100%;
  }

  img {
    max-width: 100%;
  }

  code {
    padding: 2px 5px;
    background-color: #f2e9e1;
  }

  pre code {
    color: #222;
    display: block;
    padding: 20px;
    white-space: pre-wrap;
    font-size: 14px;
    overflow-x: auto;
  }

  div.highlight pre {
    background-color: initial;
    color: initial;
  }

  div.highlight code {
    background-color: unset;
    color: unset;
  }

  blockquote {
    border-left: 1px solid #56949f;
    color: #797593;
    padding-left: 20px;
    font-style: italic;
  }

  footer {
    padding: 25px;
    text-align: center;
  }

  .helptext {
    color: #777;
    font-size: small;
  }

  .errorlist {
    color: #eba613;
    font-size: small;
  }

  /* blog posts */
  ul.blog-posts {
    list-style-type: none;
    padding: unset;
  }

  ul.blog-posts li {
    display: flex;
  }

  ul.blog-posts li span {
    flex: 0 0 130px;
  }

  ul.blog-posts li a:visited {
    color: #9893a5;
  }

  @media (prefers-color-scheme: dark) {
    body {
      background-color: #232136;
      color: #ddd;
    }

    h1,
    h2,
    h3,
    h4,
    h5,
    h6,
    strong,
    b {
      color: #e0def4;
    }

    a {
      color: #c4a7e7;
    }

    code {
      background-color: #393552;
    }

    pre code {
      color: #ddd;
    }

    blockquote {
      color: #2a273f;
    }

    textarea,
    input {
      background-color: #252525;
      color: #ddd;
    }

    .helptext {
      color: #aaa;
    }
  }

/* tiny notes */
:root {
  --light-notes-bg: #fffaf3;
  --light-notes-shadow: rgba(0, 0, 0, .075);

  --dark-notes-bg: #26233a;
  --dark-notes-shadow: rgba(0, 0, 0, .3);
}
.tiny-notes {
  width: 90vw;
  position: relative;
  left: calc(-45vw + 50%);
}
.tiny-notes ul {
  list-style-type: none;
  padding: 0;
  margin: 0;
  font-size: 1em;
}
.tiny-notes > ul {
  display: flex;
  gap: .5em;
  flex-wrap: wrap;
  flex-direction: row;
  justify-content: center;
  padding: 3em 0;
}
.tiny-notes > ul > li {
  width: 175px;
  height: 175px;
  padding: 2em;
  background-color: light-dark(var(--light-notes-bg), var(--dark-notes-bg));
  box-shadow: 0px 3px 3px light-dark(var(--light-notes-shadow), var(--dark-notes-shadow));
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}
.tiny-notes > ul > li p {
  margin: 0;
  line-height: 1;
}
.tiny-notes > ul > li > ul {
  font-size: .875rem;
  font-style: italic;
}
/* Rotation */
.tiny-notes > ul > li:first-child {
  rotate: -3deg;
}
.tiny-notes > ul > li:nth-child(odd) {
  margin-right: 1em;
}
.tiny-notes > ul > li:nth-child(even) {
  rotate: -1deg;
  margin-top: 1em;
}
.tiny-notes > ul > li:nth-child(3n) {
  rotate: -3deg;
}
.tiny-notes > ul > li:nth-child(5n) {
  rotate: 1deg;
  margin-top: 1.5em;
}
.tiny-notes > ul > li:nth-child(7n) {
  rotate: 4deg;
  margin-bottom: 1em;
}
.tiny-notes > ul > li:nth-child(11n) {
  rotate: 2deg;
  margin-top: .5em;
}
.tiny-notes > ul > li:nth-child(3),
.tiny-notes > ul > li:nth-child(13n) {
  rotate: 6deg;
}
.tiny-notes> ul > li:nth-child(17n) {
  rotate: -5deg;
}

</style>
